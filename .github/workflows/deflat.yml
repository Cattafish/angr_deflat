name: OLLVM Deflat

on:
  workflow_dispatch: # 允许在 GitHub 网页端手动触发运行

jobs:
  deflat:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install angr

      - name: Run deflat.py
        run: |
          # 提示：请根据你仓库中实际的脚本参数格式进行微调（详见下方说明）
          python3 deflat.py -f libfekit-9.3.20.so --addr 0x967CE8

      - name: Upload Recovered Binary
        uses: actions/upload-artifact@v4
        with:
          name: deflat-recovered-so
          path: |
            *recovered*
