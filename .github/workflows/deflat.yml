name: OLLVM Deflat

on:
  workflow_dispatch: # 允许手动触发

jobs:
  deflat:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ==========================================
      # 1. 开启 12GB Swap 虚拟空间（防止 angr 溢出）
      # ==========================================
      - name: Create 12GB Swap Space
        run: |
          echo "=== Before creating swap ==="
          free -h
          sudo swapoff -a
          sudo fallocate -l 12G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          echo "=== After creating swap ==="
          free -h

      # ==========================================
      # 2. 安装基础依赖
      # ==========================================
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install angr

      # ==========================================
      # 3. 直接运行你仓库里的去混淆脚本
      # ==========================================
      - name: Run Deobfuscation
        run: |
          python3 deflat.py -f libfekit-9.3.20.so --addr 0x967CE8

      # ==========================================
      # 4. 上传产物
      # ==========================================
      - name: Upload Recovered Binary
        uses: actions/upload-artifact@v4
        with:
          name: deflat-recovered-so
          path: libfekit-9.3.20_recovered.so
