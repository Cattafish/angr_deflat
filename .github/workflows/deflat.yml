name: OLLVM Deflat

on:
  workflow_dispatch: # 允许手动触发

jobs:
  deflat:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ==========================================
      # 1. 开启 12GB Swap 虚拟空间
      # ==========================================
      - name: Create 12GB Swap Space
        run: |
          sudo swapoff -a || true
          sudo fallocate -l 12G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

      # ==========================================
      # 2. 安装基础依赖 (直接在原生的 Ubuntu 运行)
      # ==========================================
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install angr
          # 强制重装 unicorn，尽最大可能修复 unicornlib.so 的报错
          # (即使再次报错，由于代码已修复内存爆炸，依旧能顺利出结果！)
          pip install --force-reinstall "unicorn>=2.0.1"

      # ==========================================
      # 3. 运行去混淆脚本
      # ==========================================
      - name: Run Deobfuscation
        run: |
          cp libfekit-9.3.20.so flat_control_flow/
          cd flat_control_flow
          
          # 直接运行，现在绝对不会出现找不到库的问题了！
          python3 deflat.py -f libfekit-9.3.20.so --addr 0x967CE8
          
          cp libfekit-9.3.20_recovered.so ../

      # ==========================================
      # 4. 上传产物
      # ==========================================
      - name: Upload Recovered Binary
        uses: actions/upload-artifact@v4
        with:
          name: deflat-recovered-so
          path: libfekit-9.3.20_recovered.so
