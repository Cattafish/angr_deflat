name: OLLVM Deflat

on:
  workflow_dispatch: # 允许手动触发

jobs:
  deflat:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ==========================================
      # 1. 开启 12GB Swap 虚拟空间（防止 angr 溢出）
      # ==========================================
      - name: Create 12GB Swap Space
        run: |
          echo "=== Before creating swap ==="
          free -h
          sudo swapoff -a
          sudo fallocate -l 12G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          echo "=== After creating swap ==="
          free -h

      # ==========================================
      # 2. 安装基础依赖
      # ==========================================
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install angr

      # ==========================================
      # 3. 进入子目录并运行你仓库里的去混淆脚本
      # ==========================================
      - name: Run Deobfuscation
        run: |
          # 1. 将放在根目录下的 .so 复制到去混淆脚本所在的子目录下
          cp libfekit-9.3.20.so flat_control_flow/
          
          # 2. 进入该目录（这样才能顺利 import am_graph 和 util）
          cd flat_control_flow
          
          # 3. 运行去混淆脚本
          python3 deflat.py -f libfekit-9.3.20.so --addr 0x967CE8
          
          # 4. 把生成好的还原文件复制回工作区根目录，以便后面的上传步骤能够找到它
          cp libfekit-9.3.20_recovered.so ../

      # ==========================================
      # 4. 上传产物
      # ==========================================
      - name: Upload Recovered Binary
        uses: actions/upload-artifact@v4
        with:
          name: deflat-recovered-so
          path: libfekit-9.3.20_recovered.so
